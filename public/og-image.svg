<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3ece0"/>
      <stop offset="100%" stop-color="#ede4d3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#b88a4a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#b88a4a" stroke-width="1" opacity="0.3"/>
  <!-- Logo / Wordmark -->
  <text x="600" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="400" letter-spacing="0.25em" fill="#b88a4a">TALANTHOS</text>
  <!-- Main Title -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#1c1a14">Discover Your</text>
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="400" fill="#1c1a14">Biblical Money Type</text>
  <!-- Subtitle -->
  <text x="600" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#7a7359">A Scripture-grounded assessment for faithful stewards</text>
  <!-- Bottom line -->
  <line x1="500" y1="520" x2="700" y2="520" stroke="#b88a4a" stroke-width="1" opacity="0.4"/>
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="16" letter-spacing="0.15em" fill="#7a7359">FAITH · FINANCES · PURPOSE</text>
</svg>
